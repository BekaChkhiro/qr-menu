name: E2E Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: Playwright (visual + functional)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: digital_menu_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d digital_menu_test"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/digital_menu_test?schema=public
      AUTH_SECRET: ci-test-secret-do-not-use-in-prod
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ENABLE_TEST_AUTH: '1'
      # Placeholder values for optional integrations so module-load code paths
      # don't crash in CI. Swap to real secrets only if a test actually needs them.
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: test
      PUSHER_APP_ID: '1'
      PUSHER_KEY: test
      PUSHER_SECRET: test
      PUSHER_CLUSTER: eu
      NEXT_PUBLIC_PUSHER_KEY: test
      NEXT_PUBLIC_PUSHER_CLUSTER: eu
      UPSTASH_REDIS_REST_URL: https://example.upstash.io
      UPSTASH_REDIS_REST_TOKEN: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database schema
        run: pnpm db:push

      - name: Build Next.js app
        run: pnpm build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium webkit

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failed test artifacts (screenshots, traces, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Comment on PR with failure details
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### ❌ Playwright E2E failed`,
              ``,
              `One or more visual or functional assertions failed on this PR.`,
              ``,
              `**Artifacts** (download from the [run page](${runUrl})):`,
              `- \`playwright-report\` — interactive HTML report with inline diffs`,
              `- \`playwright-test-results\` — raw \`*-expected.png\` / \`*-actual.png\` / \`*-diff.png\` plus traces`,
              ``,
              `**If the UI change is intentional**, regenerate baselines locally and commit them in the same PR:`,
              ``,
              `\`\`\`bash`,
              `pnpm test:e2e:update`,
              `git add tests/e2e/__screenshots__`,
              `\`\`\``,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
