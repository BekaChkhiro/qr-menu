# Local Postgres for Playwright E2E runs. Mirrors the DB the CI workflow
# provisions via its services block (see .github/workflows/e2e.yml), so tests
# behave the same locally and on PRs.
#
# Port 5433 is deliberate: it keeps a developer's usual Postgres on 5432
# untouched. Data lives on tmpfs — each `up` is a fresh database.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   DATABASE_URL="postgresql://postgres:postgres@localhost:5433/digital_menu_test?schema=public" \
#     pnpm db:push
#   DATABASE_URL="postgresql://postgres:postgres@localhost:5433/digital_menu_test?schema=public" \
#     pnpm test:e2e
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-menu-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_menu_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d digital_menu_test']
      interval: 2s
      timeout: 2s
      retries: 20
